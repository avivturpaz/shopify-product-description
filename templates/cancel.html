<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout Cancelled</title>
    <meta name="description" content="Checkout was cancelled. Return to the Shopify product description generator anytime.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.tailwindcss.com"></script>
    {% if plausible_domain %}
    <script defer data-domain="{{ plausible_domain }}" src="https://plausible.io/js/script.js"></script>
    {% endif %}
    <style>body { font-family: "Space Grotesk", sans-serif; }</style>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-3xl items-center px-4 py-16">
      <section class="w-full rounded-[2rem] border border-slate-200 bg-white p-8 shadow-sm">
        <p class="text-sm font-bold uppercase tracking-[0.24em] text-slate-500">Checkout cancelled</p>
        <h1 class="mt-4 text-5xl font-black tracking-tight">No problem, you can come back anytime</h1>
        <p class="mt-4 max-w-2xl text-lg leading-8 text-slate-600">
          The generator is still here when you’re ready to create sharper Shopify product descriptions.
        </p>
        <div class="mt-8 flex flex-col gap-3 sm:flex-row">
          <a href="/" class="inline-flex items-center justify-center rounded-full bg-amber-500 px-8 py-3 text-lg font-bold text-slate-950 transition hover:bg-amber-400">
            Return to generator
          </a>
          <a href="/pay" class="inline-flex items-center justify-center rounded-full border border-slate-300 px-8 py-3 text-lg font-bold text-slate-800 transition hover:border-slate-900 hover:text-slate-950">
            Try checkout again
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
