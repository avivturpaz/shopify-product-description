<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout Cancelled</title>
    <meta name="description" content="Checkout was cancelled. Return to the Shopify product description generator anytime.">
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        color: #0f172a;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.12), transparent 34%),
          linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
      }
      a { color: inherit; text-decoration: none; }
      main {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        border-radius: 28px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        background: rgba(255, 255, 255, 0.92);
        padding: 32px;
        box-shadow: 0 24px 72px rgba(15, 23, 42, 0.12);
      }
      .eyebrow {
        display: inline-block;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 0.75rem;
        font-weight: 800;
        color: #64748b;
      }
      h1 {
        margin: 14px 0 0;
        font-size: clamp(2.8rem, 6vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
        font-weight: 900;
      }
      p { line-height: 1.7; }
      .lead { margin-top: 16px; font-size: 1.1rem; color: #475569; max-width: 44rem; }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
      .cta, .secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 14px 24px;
        font-size: 1rem;
        font-weight: 800;
        text-decoration: none;
      }
      .cta { background: #f59e0b; color: #111827; }
      .secondary { border: 1px solid rgba(100,116,139,0.28); color: #0f172a; background: #fff; }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <p class="eyebrow">Checkout cancelled</p>
        <h1>No problem, you can come back anytime</h1>
        <p class="lead">
          The generator is still here when you’re ready to create sharper Shopify product descriptions.
        </p>
        <div class="actions">
          <a href="/" class="cta">
            Return to generator
          </a>
          <a href="/pay" class="secondary">
            Try checkout again
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
