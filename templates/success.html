<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment Successful</title>
    <meta name="description" content="Your payment was successful. Start generating Shopify product descriptions now.">
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        color: #f8fafc;
        background:
          radial-gradient(circle at top, rgba(251, 191, 36, 0.14), transparent 34%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
      }
      a { color: inherit; text-decoration: none; }
      main {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        padding: 32px;
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
      }
      .eyebrow {
        display: inline-block;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 0.75rem;
        font-weight: 800;
        color: #fcd34d;
      }
      h1 {
        margin: 14px 0 0;
        font-size: clamp(2.8rem, 6vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
        font-weight: 900;
      }
      p { line-height: 1.7; }
      .lead { margin-top: 16px; font-size: 1.1rem; color: #cbd5e1; max-width: 44rem; }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
      .cta, .secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 14px 24px;
        font-size: 1rem;
        font-weight: 800;
        text-decoration: none;
      }
      .cta { background: #f59e0b; color: #111827; }
      .secondary { border: 1px solid rgba(255,255,255,0.16); color: #fff; background: rgba(255,255,255,0.04); }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <p class="eyebrow">Payment successful</p>
        <h1>You’re ready to generate faster copy</h1>
        <p class="lead">
          Start pasting product titles and specs to create professional, casual, and urgent Shopify descriptions in one pass.
        </p>
        <div class="actions">
          <a href="/" class="cta">
            Back to generator
          </a>
          <a href="/pay" class="secondary">
            Open checkout again
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
